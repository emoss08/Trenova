# =============================================================================
# Trenova PostgreSQL Configuration
# Tuned for: CDC (logical replication), GTC projections, multi-tenant TMS
# Last reviewed: 2025
# =============================================================================

# -----------------------------------------------------------------------------
# CONNECTION
# -----------------------------------------------------------------------------
listen_addresses = '*'
max_connections = 300                    # Use pgBouncer in front of this if you haven't already

# -----------------------------------------------------------------------------
# MEMORY
# Adjust these based on your server RAM. Values below assume 16GB RAM.
# Rule of thumb: shared_buffers=25%, effective_cache_size=75%, work_mem careful
# -----------------------------------------------------------------------------
shared_buffers = 4GB                     # 25% of RAM
work_mem = 32MB                          # Per operation, not per connection — can multiply
maintenance_work_mem = 512MB             # VACUUM, CREATE INDEX, ALTER TABLE
effective_cache_size = 12GB              # Planner hint: shared_buffers + OS page cache (~75% RAM)
wal_buffers = 64MB                       # Default is too small; 64MB is a safe ceiling
logical_decoding_work_mem = 256MB        # Needed for wide-row logical decoding workloads like shipments

# -----------------------------------------------------------------------------
# PLANNER
# Critical: default random_page_cost=4.0 assumes spinning disk
# -----------------------------------------------------------------------------
random_page_cost = 1.1                   # SSD — dramatically affects index vs seqscan decisions
effective_io_concurrency = 200           # SSD parallel I/O
seq_page_cost = 1.0                      # Leave at default

# -----------------------------------------------------------------------------
# PARALLEL QUERY
# -----------------------------------------------------------------------------
max_worker_processes = 16
max_parallel_workers = 8
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 2

# -----------------------------------------------------------------------------
# WAL
# -----------------------------------------------------------------------------
wal_level = logical                      # Required for GTC / CDC
wal_compression = on                     # Reduces WAL volume, negligible CPU cost
wal_buffers = 64MB
wal_writer_delay = 200ms
wal_keep_size = 1GB                      # Up from 128MB — CDC consumers need headroom

# -----------------------------------------------------------------------------
# LOGICAL REPLICATION / CDC (GTC-specific)
# -----------------------------------------------------------------------------
max_replication_slots = 10
max_wal_senders = 15                     # >= max_replication_slots + headroom
max_logical_replication_workers = 10
logical_decoding_work_mem = 256MB        # Critical for GTC's full-row diff on wide tables
max_slot_wal_keep_size = 10GB            # CRITICAL — prevents disk fill from lagging/dead slots

# -----------------------------------------------------------------------------
# CHECKPOINTS
# -----------------------------------------------------------------------------
checkpoint_timeout = 10min               # Up from 5min — reduces checkpoint frequency
checkpoint_completion_target = 0.9       # Spread I/O over 90% of checkpoint interval
min_wal_size = 1GB
max_wal_size = 4GB

# -----------------------------------------------------------------------------
# AUTOVACUUM
# Defaults are too conservative for a high-churn TMS (shipment status updates etc.)
# -----------------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 4               # Default 3 — extra worker for busy tables
autovacuum_naptime = 30s                 # Check more frequently (default 1min)
autovacuum_vacuum_scale_factor = 0.05    # Vacuum at 5% dead tuples (default 20%)
autovacuum_analyze_scale_factor = 0.02   # Analyze at 2% changes (default 10%)
autovacuum_vacuum_cost_delay = 2ms       # Let autovacuum run faster (default 20ms)
autovacuum_vacuum_insert_scale_factor = 0.05

# -----------------------------------------------------------------------------
# EXTENSIONS
# -----------------------------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements, pg_prewarm'
pg_stat_statements.track = all
pg_stat_statements.max = 10000
pg_prewarm.autoprewarm = on
pg_prewarm.autoprewarm_interval = 300    # Save buffer state every 5 minutes

# -----------------------------------------------------------------------------
# TIMEOUTS & SAFETY
# -----------------------------------------------------------------------------
idle_in_transaction_session_timeout = 30s   # Kill hung transactions
lock_timeout = 10s                           # Don't let locks pile up silently
deadlock_timeout = 1s                        # Default is fine, explicit is better

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
log_min_duration_statement = 500            # Log queries slower than 500ms
log_temp_files = 0                          # Log all temp file creation (work_mem spills)
log_lock_waits = on
log_checkpoints = on
log_autovacuum_min_duration = 250ms         # Surface slow vacuums
log_replication_commands = on
log_connections = on                        # Revisit if using pgBouncer at scale
log_disconnections = on                     # Same as above
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_error_verbosity = default

# -----------------------------------------------------------------------------
# STATISTICS
# -----------------------------------------------------------------------------
track_activities = on
track_counts = on
track_io_timing = on                        # Useful with pg_stat_statements
track_wal_io_timing = on                    # PG14+ — WAL I/O visibility
