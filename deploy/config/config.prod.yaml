app:
  name: trenova
  env: production
  debug: false
  version: 0.0.7
  problemTypeBaseUri: https://api.trenova.app/problems/

platform:
  mode: self_hosted
  instanceId: ""
  controlPlane:
    enabled: false
    endpoint: ""
    apiKey: ""
    timeout: 5s
    heartbeatInterval: 5m
    failOpenOnError: false

server:
  host: 0.0.0.0
  port: 8080
  mode: release
  readTimeout: 30s
  readHeaderTimeout: 5s
  writeTimeout: 30s
  idleTimeout: 120s
  shutdownTimeout: 15s
  cors:
    enabled: true
    allowedOrigins:
      - https://trenova.app
      - https://app.trenova.app
      - https://cloud.trenova.app
    allowedMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
    allowedHeaders:
      - Authorization
      - Content-Type
      - Accept
      - X-CSRF-Token
    exposeHeaders:
      - X-Request-Id
    credentials: true
    maxAge: 86400

database:
  host: postgres
  port: 5432
  name: trenova_db
  user: trenova
  password: placeholder
  sslMode: disable
  maxIdleConns: 25
  maxOpenConns: 75
  connMaxLifetime: 1h
  connMaxIdleTime: 10m
  statementTimeout: 10s
  lockTimeout: 5s
  idleInTransactionSessionTimeout: 30s

cache:
  host: redis
  port: 6379
  password: ""
  db: 0
  poolSize: 50
  minIdleConns: 10
  maxRetries: 3
  minRetryBackoff: 100ms
  maxRetryBackoff: 1s
  dialTimeout: 5s
  readTimeout: 3s
  writeTimeout: 3s
  poolTimeout: 10s
  connMaxIdleTime: 10m
  connMaxLifetime: 1h

search:
  enabled: true
  defaultLimit: 8
  meilisearch:
    url: http://meilisearch:7700
    apiKey: placeholder
    timeout: 3s
    indexes:
      shipments: shipments
      customers: customers
      workers: workers
      documents: documents

storage:
  provider: minio
  endpoint: minio:9000
  publicEndpoint: ""
  accessKey: placeholder
  secretKey: placeholder
  bucket: trenova
  region: us-east-1
  useSSL: false
  autoCreateBucket: true
  maxFileSize: 52428800
  maxFilesPerUpload: 10
  presignedUrlExpiry: 15m

documentIntelligence:
  enabled: true
  ocrCommand: tesseract
  ocrLanguage: eng
  ocrTimeout: 45s
  enableAI: false
  aiTimeout: 20s
  aiMaxInputChars: 24000
  aiExtractionMaxTokens: 5000
  aiClassificationModel: gpt-5-nano-2025-08-07
  aiExtractionModel: gpt-5-mini-2025-08-07
  aiMaxRetries: 2
  enableOCRPreprocessing: true
  ocrPreprocessingMode: standard
  ocrMaxImageDimension: 2400
  maxOCRPages: 25
  maxExtractedChars: 200000
  reconcileBatchSize: 100
  maxConcurrentActivities: 2

security:
  session:
    secret: placeholder-secret-min-32-characters-long
    name: __Host-trenova_session
    maxAge: 24h
    httpOnly: true
    secure: true
    sameSite: strict
    path: /
    domain: ""
    refreshWindow: 1h
  apiToken:
    enabled: true
    defaultExpiry: 0s
    maxExpiry: 8760h
    maxTokensPerUser: 100
    usageFlushInterval: 10s
    usageUpdateTimeout: 3s
    usageMaxPending: 10000
  rateLimit:
    enabled: true
    requestsPerMinute: 600
    burstSize: 100
    cleanupInterval: 1m
  csrf:
    tokenName: csrf_token
    headerName: X-CSRF-Token
    trustedOrigins:
      - https://trenova.app
      - https://app.trenova.app
      - https://cloud.trenova.app
    browserGuard:
      mode: enforce
  encryption:
    key: placeholder-encryption-key-min-32-chars

monitoring:
  metrics:
    enabled: false
    host: 127.0.0.1
    port: 9090
    path: /internal/metricsz
  tracing:
    enabled: false
    provider: stdout
    endpoint: localhost:4317
    serviceName: trenova-tms
    samplingRate: 0
  health:
    path: /health
    readinessPath: /ready
    livenessPath: /live
    checkInterval: 30s
    timeout: 5s

logging:
  level: info
  format: json
  output: stdout
  sampling: false
  stacktrace: false

temporal:
  hostPort: temporal:7233
  namespace: default
  identity: trenova-tms
  security:
    enableEncryption: false
    encryptionKeyID: unused
    enableCompression: false
    compressionThreshold: 0
  interceptors:
    enableLogging: false
    logLevel: info
  schedule:
    persistOnStop: true
  worker:
    maxConcurrentActivities: 20
    maxConcurrentWorkflows: 10
    maxActivityPollers: 2
    maxWorkflowPollers: 2
    workerStopTimeout: 30s

audit:
  bufferFlushInterval: 1m
  batchSize: 500
  maxEntriesPerFlush: 5000
  dlqRetryInterval: 5m
  dlqMaxRetries: 5

system:
  systemUserPassword: placeholder

ably:
  apiKey: placeholder

twilio:
  enabled: false
  accountSID: ""
  authToken: ""
  fromNumber: ""

update:
  enabled: true
  checkInterval: 1h
  githubOwner: emoss08
  githubRepo: trenova
  allowPrerelease: false
  proxyUrl: ""
  offlineMode: false
