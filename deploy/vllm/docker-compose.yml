services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: trenova-vllm
    runtime: nvidia
    ipc: host
    ports:
      - "8000:8000"
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - VLLM_API_KEY=${VLLM_API_KEY:-change-me}
    command:
      - --model
      - ${VLLM_MODEL:-Qwen/Qwen2.5-14B-Instruct}
      - --served-model-name
      - ${VLLM_MODEL:-Qwen/Qwen2.5-14B-Instruct}
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --max-model-len
      - "${VLLM_MAX_MODEL_LEN:-8192}"
      - --gpu-memory-utilization
      - "${VLLM_GPU_MEM_UTIL:-0.90}"
      - --dtype
      - auto
      - --enable-auto-tool-choice
      - --tool-call-parser
      - hermes
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
