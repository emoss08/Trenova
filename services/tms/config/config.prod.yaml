app:
  env: production
  debug: false

server:
  mode: release
  cors:
    enabled: true
    allowedOrigins:
      - https://app.trenova.io
      - https://trenova.io
    allowedMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
    allowedHeaders:
      - Authorization
      - Content-Type
      - Accept
      - X-CSRF-Token
    credentials: true
    maxAge: 86400

database:
  sslMode: require
  maxIdleConns: 25
  maxOpenConns: 200

cache:
  poolSize: 50
  minIdleConns: 10

security:
  session:
    name: __Host-trenova_session
    secure: true # Force HTTPS cookies in production
    httpOnly: true
    sameSite: strict # Stricter CSRF protection
    path: /
    domain: ""
  rateLimit:
    requestsPerMinute: 30
  csrf:
    trustedOrigins:
      - https://app.trenova.io
      - https://trenova.io
    browserGuard:
      mode: enforce

logging:
  level: info
  output: stdout

monitoring:
  metrics:
    enabled: true
    port: 9090
    path: /metrics
  health:
    path: /health
    readinessPath: /ready
    livenessPath: /live
  tracing:
    enabled: true
    provider: otlp
    endpoint: localhost:4317
    serviceName: trenova
    samplingRate: 1.0
