app:
  env: production
  debug: false

server:
  mode: release
  readTimeout: 30s
  readHeaderTimeout: 5s
  writeTimeout: 75s
  idleTimeout: 120s
  shutdownTimeout: 10s
  requestTimeout: 55s
  cors:
    enabled: true
    allowedOrigins:
      - https://trenova.app
      - https://app.trenova.app
      - https://cloud.trenova.app
    allowedMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
    allowedHeaders:
      - Authorization
      - Content-Type
      - Accept
      - X-CSRF-Token
    credentials: true
    maxAge: 86400

database:
  sslMode: require
  maxIdleConns: 25
  maxOpenConns: 75
  statementTimeout: 10s
  lockTimeout: 5s
  idleInTransactionSessionTimeout: 30s

cache:
  poolSize: 50
  minIdleConns: 10

security:
  session:
    name: __Host-trenova_session
    secure: true # Force HTTPS cookies in production
    httpOnly: true
    sameSite: strict # Stricter CSRF protection
    path: /
    domain: ""
  rateLimit:
    requestsPerMinute: 30
  csrf:
    trustedOrigins:
      - https://trenova.app
      - https://app.trenova.app
      - https://cloud.trenova.app
    browserGuard:
      mode: enforce

logging:
  level: info
  output: stdout

monitoring:
  metrics:
    enabled: true
    host: 127.0.0.1
    port: 9090
    path: /internal/metricsz
  health:
    path: /health
    readinessPath: /ready
    livenessPath: /live
  tracing:
    enabled: true
    provider: otlp
    endpoint: localhost:4317
    serviceName: trenova
    samplingRate: 1.0
