# Trenova Configuration Example
# Copy this file to config.yaml and modify as needed

# Application settings
app:
  name: trenova # Application name
  env: development # Environment: development, staging, production
  debug: true # Enable debug mode
  version: 1.0.0 # Application version
  problemTypeBaseUri: https://api.trenova.app/problems/ # RFC 9457 problem type base URI

platform:
  mode: self_hosted # community/self_hosted/development/cloud/enterprise
  instanceId: "" # Set from TRENOVA_INSTANCE_ID when control plane is enabled
  controlPlane:
    enabled: false
    endpoint: "" # Example: http://localhost:8090
    apiKey: "" # Set from TRENOVA_CONTROL_PLANE_API_KEY
    timeout: 5s
    heartbeatInterval: 5m
    failOpenOnError: false # Development only

# HTTP Server configuration
server:
  host: 0.0.0.0 # Server host
  port: 8080 # Server port
  mode: debug # Gin mode: debug, release, test
  readTimeout: 30s # Maximum duration for reading the full request
  readHeaderTimeout: 5s # Maximum duration for reading request headers
  writeTimeout: 75s # Must be longer than requestTimeout so app-controlled 504s can be written
  idleTimeout: 120s # Maximum keep-alive idle connection duration
  shutdownTimeout: 10s # Maximum graceful shutdown duration
  requestTimeout: 55s # Maximum app-controlled handler duration
  cors:
    enabled: true # Enable CORS
    allowedOrigins: # Allowed origins for CORS
      - http://localhost:5173
      - http://localhost:3000
    allowedMethods: # Allowed HTTP methods
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
    allowedHeaders: # Allowed headers
      - Authorization
      - Content-Type
      - Accept
      - X-CSRF-Token
    exposeHeaders: # Headers exposed to the client
      - X-Request-Id
    credentials: true # Allow credentials
  maxAge: 86400 # Preflight cache duration in seconds

monitoring:
  pprof:
    enabled: false
    host: 127.0.0.1
    port: 6060

# PostgreSQL database configuration
database:
  host: localhost # Database host
  port: 5432 # Database port
  name: trenova_go_db # Database name
  user: postgres # Database user
  password: postgres # Database password
  sslMode: disable # SSL mode: disable, require, verify-ca, verify-full
  statementTimeout: 10s # Per-statement database deadline
  lockTimeout: 5s # Maximum time a statement may wait for a lock
  idleInTransactionSessionTimeout: 30s # Maximum time a transaction may sit idle

# Search configuration
search:
  enabled: false # Enable Meilisearch-backed global search
  defaultLimit: 8 # Default number of hits returned per entity group
  meilisearch:
    url: http://localhost:7700 # Meilisearch base URL
    apiKey: "" # Optional API key
    timeout: 3s # Request timeout
    indexes:
      shipments: shipments
      customers: customers
      workers: workers
      documents: documents

# Object storage configuration
storage:
  provider: minio # minio or r2
  endpoint: localhost:9000 # MinIO: localhost:9000; R2: https://<account-id>.r2.cloudflarestorage.com
  publicEndpoint: "" # Leave empty for R2 private presigned URLs
  accessKey: minioadmin
  secretKey: minioadmin
  bucket: trenova-test
  region: us-east-1 # Use auto for Cloudflare R2
  useSSL: false # true for Cloudflare R2
  autoCreateBucket: true # false for Cloudflare R2 production
  maxFileSize: 52428800 # Maximum size per uploaded file in bytes
  maxFilesPerUpload: 10 # Maximum files accepted by a bulk upload request

documentIntelligence:
  enabled: true # Enable async extraction/classification
  ocrCommand: tesseract # OCR binary path
  ocrLanguage: eng # OCR language pack
  ocrTimeout: 45s # Hard timeout per OCR process
  enableAI: false # Enable OpenAI-assisted document intelligence
  aiTimeout: 20s # Hard timeout per AI request
  aiMaxInputChars: 24000 # Max extracted text sent to AI
  aiClassificationModel: gpt-5-nano-2025-08-07 # Pinned AI routing model
  aiExtractionModel: gpt-5-mini-2025-08-07 # Pinned AI extraction model
  aiMaxRetries: 2 # Retry count for transient AI failures
  enableOCRPreprocessing: true # Preprocess scanned images before OCR
  ocrPreprocessingMode: standard # standard preprocessing pipeline
  ocrMaxImageDimension: 2400 # Max width/height for preprocessed OCR images
  maxOCRPages: 25 # Max scanned pages OCR will attempt per document
  maxExtractedChars: 200000 # Max stored extracted text
  reconcileBatchSize: 100 # Batch size for stale-job reconciliation
  maxConcurrentActivities: 2 # Dedicated document-intelligence worker concurrency

# Security configuration
security:
  session:
    secret: super-secret-key 
    name: trenova_session # Cookie name for session
    maxAge: 24h # Session max age in seconds (24 hours)
    httpOnly: true # HttpOnly flag for cookies
    secure: false # Secure flag (true for HTTPS only)
    sameSite: lax # SameSite policy: strict, lax, none
    domain: "" # Cookie domain (empty = current domain)
    path: "/" # Cookie path
    refreshWindow: 3600 # Refresh if expires within window (seconds)
  rateLimit:
    enabled: true # Enable rate limiting
    requestsPerMinute: 60 # Requests per minute per IP
  csrf:
    tokenName: csrf_token # Name for CSRF token in session
    headerName: X-CSRF-Token # Header name for CSRF token
    trustedOrigins: [] # Optional override; defaults to server.cors.allowedOrigins
    browserGuard:
      mode: report # enforce, report, or off
  encryption:
    mode: envelope # envelope, disabled (tests only)
    keyManager: local # local for dev/test; production/staging must use gcp-autokey
    key: super-secret-key # Encryption key (min 32 chars)
    gcpKms:
      cryptoKey: "" # Full Cloud KMS crypto key name for production/staging
      credentialsMode: adc # adc, workload-identity, or credentials-file
      credentialsFile: ""
      timeout: 10s
      retryAttempts: 3

# Logging configuration
logging:
  level: debug # Log level: debug, info, warn, error
  format: json # Log format: json, text
  output: file # Log output: stdout, file
  file:
    path: logs/trenova.log # Log file path
    maxSize: 100 # Maximum file size in MB
    maxAge: 30 # Maximum file age in days
    maxBackups: 10 # Maximum number of backups

# Samsara integration configuration (optional)
samsara:
  token: "" # Samsara API token with required scopes
  baseURL: https://api.samsara.com # Override for EU/CA as needed
  timeout: 30s
  userAgent: trenova-tms/1.0
  retry:
    enabled: true
    maxAttempts: 4
    initialBackoff: 500ms
    maxBackoff: 10s

# Reporting configuration (optional — all keys have sensible defaults)
reporting:
  deliveryLinkBaseUrl: "" # Public app URL used in scheduled-report emails, e.g. https://app.example.com
  emailMaxAttachmentBytes: 10485760 # Max artifact size attached to scheduled-report emails (10 MiB)

# Driver portal (Dash) settings
portal:
    # Absolute base URL of the client app; used to build portal invitation links in emails
    baseUrl: http://localhost:5173

# Web push (VAPID) for driver portal notifications. Generate keys with
# github.com/SherClockHolmes/webpush-go GenerateVAPIDKeys; empty keys disable push.
push:
    vapidPublicKey: ""
    vapidPrivateKey: ""
    subject: mailto:admin@example.com
