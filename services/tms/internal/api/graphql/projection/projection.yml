      lastKnownLocationName: lastKnownLocation
    relations:
      businessUnit:
        target: BusinessUnit
      organization:
        target: Organization
      equipmentType:
        target: EquipmentType
        gate: equipmentDetails
      equipmentManufacturer:
        target: EquipmentManufacturer
        gate: equipmentDetails
      fleetCode:
        target: FleetCode
        gate: fleetDetails
