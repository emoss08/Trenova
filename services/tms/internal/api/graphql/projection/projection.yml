types:
  Trailer:
    always:
      - id
      - createdAt
    aliases:
      equipmentStatus: status
    virtuals:
      customFields: customFields
      lastKnownLocation: lastKnownLocation
      lastKnownLocationId: lastKnownLocation
      lastKnownLocationName: lastKnownLocation
    relations:
      businessUnit:
        target: BusinessUnit
      organization:
        target: Organization
      equipmentType:
        target: EquipmentType
