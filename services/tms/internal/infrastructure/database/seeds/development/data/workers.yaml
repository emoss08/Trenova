# Notes on YAML Features:
#
# 1. Comments start with #
# 2. Lists use the dash (-) syntax
# 3. Nested structures use indentation (2 spaces recommended)
# 4. Strings with special characters should be quoted
# 5. Booleans: true/false
# 6. Dates: Use ISO format (YYYY-MM-DD)
# 7. Numbers: No quotes needed
# 8. Null values: null or ~ or omit the field
#
# Example mapping in Go seed:
#
# type WorkerData struct {
#     Code                string   `yaml:"code"`
#     Status              string   `yaml:"status"`
#     WorkerType          string   `yaml:"worker_type"`
#     FirstName           string   `yaml:"first_name"`
#     LastName            string   `yaml:"last_name"`
#     AddressLine1        string   `yaml:"address_line_1"`
#     AddressLine2        string   `yaml:"address_line_2"`
#     City                string   `yaml:"city"`
#     StateAbbreviation   string   `yaml:"state_abbreviation"`
#     ZipCode             string   `yaml:"zip_code"`
#     Email               string   `yaml:"email"`
#     PhoneNumber         string   `yaml:"phone_number"`
#     DateOfBirth         string   `yaml:"date_of_birth"`
#     HireDate            string   `yaml:"hire_date"`
#     TerminationDate     string   `yaml:"termination_date"`
#     LicenseNumber       string   `yaml:"license_number"`
#     LicenseState        string   `yaml:"license_state"`
#     LicenseExpiration   string   `yaml:"license_expiration"`
#     Endorsements        []string `yaml:"endorsements"`
#     MedicalCertDate     string   `yaml:"medical_cert_date"`
#     ForkLiftCertified   bool     `yaml:"forklift_certified"`
#     Certifications      []string `yaml:"certifications"`
#     IsActive            bool     `yaml:"is_active"`
#     Comments            string   `yaml:"comments"`
# }
