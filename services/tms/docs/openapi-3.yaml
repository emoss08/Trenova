        github_com_emoss08_trenova_internal_core_domain_fiscalyear.FiscalYear:
            properties:
                allowAdjustingEntries:
                    description: |-
                        AllowAdjustingEntries is the master switch for whether any period in this
                        fiscal year can accept adjusting journal entries. If false, no period can
                        accept adjusting entries regardless of its own per-period setting. If true,
                        it defers to each period's AllowAdjustingEntries flag. This gives the CFO
                        a single kill-switch to lock down the entire year.
                    type: boolean
                businessUnit:
                    $ref: '#/components/schemas/github_com_emoss08_trenova_internal_core_domain_tenant.BusinessUnit'
                businessUnitId:
                    type: string
                closedAt:
                    type: integer
                closedBy:
                    $ref: '#/components/schemas/github_com_emoss08_trenova_internal_core_domain_tenant.User'
                closedById:
                    type: string
                createdAt:
                    type: integer
                description:
                    description: Description is optional free-text for notes about this fiscal year.
                    type: string
                endDate:
                    description: EndDate is the last day of the fiscal year as a Unix epoch timestamp.
                    type: integer
                id:
                    type: string
                isCalendarYear:
                    description: |-
                        IsCalendarYear is a denormalized flag indicating the fiscal year aligns
                        with Jan 1 – Dec 31. Saves a date comparison on every query that needs
                        to know whether this is a standard or offset fiscal year.
                    type: boolean
                isCurrent:
                    description: |-
                        IsCurrent indicates this is the active fiscal year for day-to-day operations.
                        Only one fiscal year per organization+business_unit can be current at a time.
                        Enforced at the DB level with a partial unique index where is_current = TRUE.
                    type: boolean
                lockedAt:
                    type: integer
                lockedBy:
                    $ref: '#/components/schemas/github_com_emoss08_trenova_internal_core_domain_tenant.User'
                lockedById:
                    type: string
                name:
                    description: Name is the display name (e.g. "FY2026", "Fiscal Year 2025-2026").
                    type: string
                organization:
                    $ref: '#/components/schemas/github_com_emoss08_trenova_internal_core_domain_tenant.Organization'
                organizationId:
                    type: string
                periods:
                    items:
                        $ref: '#/components/schemas/github_com_emoss08_trenova_internal_core_domain_fiscalperiod.FiscalPeriod'
                    type: array
                reopenReason:
                    type: string
                reopenedAt:
                    type: integer
                reopenedBy:
                    $ref: '#/components/schemas/github_com_emoss08_trenova_internal_core_domain_tenant.User'
                reopenedById:
                    type: string
                startDate:
                    description: StartDate is the first day of the fiscal year as a Unix epoch timestamp.
                    type: integer
                status:
                    allOf:
                        - $ref: '#/components/schemas/github_com_emoss08_trenova_internal_core_domain_fiscalyear.Status'
                    description: |-
                        Status tracks the fiscal year's position in its lifecycle.
                        Draft → Open → Closed → PermanentlyClosed.
                        Only Closed can revert to Open (with proper authorization).
                updatedAt:
                    type: integer
                version:
                    type: integer
                year:
                    description: |-
                        Year is the fiscal year number (e.g. 2026). For fiscal years that span
                        calendar years (Oct 2025 – Sep 2026), this is typically the year the
                        fiscal year ends in, but the carrier can set it to match their convention.
                    type: integer
            type: object
