query PayProfileTable($input: DataTableConnectionInput!) {
  payProfiles(input: $input) {
    edges {
      node {
        id
        organizationId
        businessUnitId
        status
        name
        description
        classification
        currencyCode
        guaranteedPeriodMinimumMinor
        perDiemRatePerMile
        perDiemDailyCapMinor
        version
        createdAt
        updatedAt
        activeAssignmentCount
        components {
          id
          kind
          method
          description
          rate
          revenueBasis
          bands {
            minMiles
            maxMiles
            rate
          }
          freeTimeMinutes
          minAmountMinor
          maxAmountMinor
          sequence
          isActive
        }
      }
    }
    totalCount
    pageInfo {
      ...DataTablePageInfoFields
    }
  }
}

query PayProfileOptions($input: DataTableConnectionInput!) {
  payProfiles(input: $input) {
    edges {
      node {
