fragment EdiPartnerRowFields on EdiPartner {
  id
  businessUnitId
  organizationId
  kind
  status
  code
  name
  description
  internalOrganizationId
  customerId
  defaultTransportId
  defaultMappingProfileId
  country
  timezone
  contactName
  contactEmail
  contactPhone
  enabledForInbound
  enabledForOutbound
  version
  createdAt
  updatedAt
  internalOrganization {
    id
    name
  }
  connection {
    id
    method
    status
  }
  defaultTransport {
    id
    name
    method
  }
}

query EdiPartnerTable($input: DataTableConnectionInput!) {
  ediPartners(input: $input) {
    edges {
      node {
        ...EdiPartnerRowFields
      }
    }
    totalCount
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

