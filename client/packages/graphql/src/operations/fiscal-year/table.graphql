fragment FiscalPeriodFields on FiscalPeriod {
  id
  businessUnitId
  organizationId
  fiscalYearId
  periodNumber
  periodType
  status
  name
  startDate
  endDate
  closedAt
  version
  createdAt
  updatedAt
}

fragment FiscalYearTableRowFields on FiscalYear {
  id
  businessUnitId
  organizationId
  status
  year
  name
  description
  startDate
  endDate
  isCurrent
  isCalendarYear
  allowAdjustingEntries
  version
  createdAt
  updatedAt
  periods {
    ...FiscalPeriodFields
  }
}

query FiscalYearTable($input: DataTableConnectionInput!) {
  fiscalYears(input: $input) {
    edges {
      node {
        ...FiscalYearTableRowFields
      }
    }
    totalCount
    pageInfo {
      ...DataTablePageInfoFields
    }
  }
}
