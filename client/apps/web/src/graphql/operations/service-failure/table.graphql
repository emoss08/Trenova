fragment ServiceFailureTableRowFields on ServiceFailure {
  id
  shipmentId
  number
  type
  source
  status
  stopType
  stopId
  scheduledCutoff
  actualArrival
  gracePeriodMinutes
  lateMinutes
  reasonCodeId
  notes
  detectedAt
  version
  shipment {
    id
    proNumber
    bol
  }
  stop {
    id
    type
    sequence
    locationId
    location {
      id
      name
      code
      city
      state {
        abbreviation
      }
    }
  }
  reasonCode {
    id
    code
    label
  }
}

query ServiceFailureTable($input: DataTableConnectionInput!, $shipmentId: ID) {
  serviceFailures(input: $input, shipmentId: $shipmentId) {
    edges {
      node {
        ...ServiceFailureTableRowFields
      }
    }
    totalCount
    pageInfo {
      ...DataTablePageInfoFields
    }
  }
}
