  tractors(after: String, fieldFilters: [FieldFilterInput!], filterGroups: [FilterGroupInput!], first: Int = 20, includeEquipmentDetails: Boolean = false, includeFleetDetails: Boolean = false, includeWorkerDetails: Boolean = false, offset: Int, query: String, sort: [SortFieldInput!], status: EquipmentStatus): TractorConnection!
  trailer(id: ID!): Trailer
  trailers(after: String, fieldFilters: [FieldFilterInput!], filterGroups: [FilterGroupInput!], first: Int = 20, includeEquipmentDetails: Boolean = false, includeFleetDetails: Boolean = false, offset: Int, query: String, sort: [SortFieldInput!], status: EquipmentStatus): TrailerConnection!
