fragment EquipmentTypeTableFields on EquipmentType {
  id
  code
  color
}

fragment EquipmentManufacturerTableFields on EquipmentManufacturer {
  id
  name
}

fragment FleetCodeTableFields on FleetCode {
  id
  code
  color
}

fragment UsStateTableFields on UsState {
  id
  name
  abbreviation
}

fragment WorkerTableReferenceFields on Worker {
  id
  firstName
  lastName
  wholeName
}

fragment DataTablePageInfoFields on PageInfo {
  hasNextPage
  endCursor
}

fragment TractorTableRowFields on Tractor {
  id
  businessUnitId
  organizationId
  primaryWorkerId
  equipmentTypeId
  equipmentManufacturerId
  stateId
  fleetCodeId
  secondaryWorkerId
  status
  code
  model
  make
  year
  licensePlateNumber
  registrationNumber
  registrationExpiry
  vin
  lastKnownLocationId
  lastKnownLocationName
  version
  createdAt
  updatedAt
  customFields
  equipmentType {
    ...EquipmentTypeTableFields
  }
  equipmentManufacturer {
    ...EquipmentManufacturerTableFields
  }
  fleetCode {
    ...FleetCodeTableFields
  }
  state {
    ...UsStateTableFields
  }
  primaryWorker {
    ...WorkerTableReferenceFields
  }
  secondaryWorker {
    ...WorkerTableReferenceFields
  }
}

fragment TrailerTableRowFields on Trailer {
  id
  businessUnitId
  organizationId
  equipmentTypeId
  equipmentManufacturerId
  registrationStateId
  fleetCodeId
  status
  code
  model
  make
  year
  licensePlateNumber
  vin
  registrationNumber
  maxLoadWeight
  lastInspectionDate
  registrationExpiry
  lastKnownLocationId
  lastKnownLocationName
  version
  createdAt
  updatedAt
  customFields
  equipmentType {
    ...EquipmentTypeTableFields
  }
  equipmentManufacturer {
    ...EquipmentManufacturerTableFields
  }
  fleetCode {
    ...FleetCodeTableFields
  }
  registrationState {
    ...UsStateTableFields
  }
}

query TractorTable(
  $first: Int!
  $offset: Int
  $after: String
  $query: String
  $fieldFilters: [FieldFilterInput!]
  $filterGroups: [FilterGroupInput!]
  $sort: [SortFieldInput!]
  $includeEquipmentDetails: Boolean = true
  $includeFleetDetails: Boolean = true
  $includeWorkerDetails: Boolean = true
) {
  tractors(
    first: $first
    offset: $offset
    after: $after
    query: $query
    fieldFilters: $fieldFilters
    filterGroups: $filterGroups
    sort: $sort
    includeEquipmentDetails: $includeEquipmentDetails
    includeFleetDetails: $includeFleetDetails
    includeWorkerDetails: $includeWorkerDetails
  ) {
    edges {
      node {
        ...TractorTableRowFields
      }
    }
    totalCount
    pageInfo {
      ...DataTablePageInfoFields
    }
  }
}

query TrailerTable(
  $first: Int!
  $offset: Int
  $after: String
  $query: String
  $fieldFilters: [FieldFilterInput!]
  $filterGroups: [FilterGroupInput!]
  $sort: [SortFieldInput!]
  $includeEquipmentDetails: Boolean = true
  $includeFleetDetails: Boolean = true
) {
  trailers(
    first: $first
    offset: $offset
    after: $after
    query: $query
    fieldFilters: $fieldFilters
    filterGroups: $filterGroups
    sort: $sort
    includeEquipmentDetails: $includeEquipmentDetails
    includeFleetDetails: $includeFleetDetails
  ) {
    edges {
      node {
        ...TrailerTableRowFields
      }
    }
    totalCount
    pageInfo {
      ...DataTablePageInfoFields
    }
  }
}
