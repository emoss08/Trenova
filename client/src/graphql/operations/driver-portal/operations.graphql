query WorkerPortalStatus($workerId: ID!) {
  workerPortalStatus(workerId: $workerId) {
    linked
    portalUser {
      id
      name
      emailAddress
      status
      lastLoginAt
    }
    pendingInvitation {
      id
      email
      status
      expiresAt
      createdAt
    }
    invitations {
      id
      email
      status
      expiresAt
      acceptedAt
      createdAt
      invitedBy {
        id
        name
      }
    }
  }
}

mutation InviteWorkerToPortal($input: InviteWorkerToPortalInput!) {
  inviteWorkerToPortal(input: $input) {
    invitation {
      id
      email
      status
      expiresAt
    }
    inviteUrl
    emailSent
  }
}

mutation RevokeWorkerPortalAccess($workerId: ID!) {
  revokeWorkerPortalAccess(workerId: $workerId)
}

query SettlementDisputeTable($input: DataTableConnectionInput!) {
  settlementDisputes(input: $input) {
    edges {
      node {
        id
        settlementId
        settlementLineId
        workerId
        status
        category
        description
        resolutionNote
        resolvedAt
        createdAt
        updatedAt
        version
        worker {
          id
          firstName
          lastName
        }
        settlement {
          id
          settlementNumber
          netPayMinor
          currencyCode
          status
        }
        resolvedBy {
          id
          name
        }
      }
    }
    totalCount
    pageInfo {
      ...DataTablePageInfoFields
    }
  }
}

query SettlementDisputeDetail($id: ID!) {
  settlementDispute(id: $id) {
    id
    settlementId
    settlementLineId
    workerId
    status
    category
    description
    submittedByUserId
    resolutionNote
    resolutionLineId
    resolvedById
    resolvedAt
    version
    createdAt
    updatedAt
    worker {
      id
      firstName
      lastName
    }
    settlement {
      id
      settlementNumber
      status
      periodStart
      periodEnd
      netPayMinor
      grossEarningsMinor
      deductionsMinor
      currencyCode
    }
    settlementLine {
      id
      lineNumber
      category
      description
      amountMinor
      proNumber
    }
    resolvedBy {
      id
      name
    }
  }
}

