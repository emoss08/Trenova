}

mutation CalculateShipmentTotals($input: ShipmentInput!) {
  calculateShipmentTotals(input: $input) {
    freightChargeAmount
    otherChargeAmount
    totalChargeAmount
    fuelSurcharge {
      accessorialChargeId
      isSystemGenerated
      method
      amount
      unit
      fuelSurchargeProgramId
      fuelSurchargeDetail
    }
  }
}

mutation CalculateShipmentDistance($input: ShipmentInput!) {
  calculateShipmentDistance(input: $input) {
    shipmentId
    totalDistance
    moves {
      moveId
      moveIndex
      distance
      source
      provider
      routingType
      dataVersion
      distanceUnits
      distanceProfileId
      distanceProfileName
      warnings
      calculatedAt
