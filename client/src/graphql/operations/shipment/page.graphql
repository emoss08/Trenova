mutation CreateShipmentComment($shipmentId: ID!, $input: ShipmentCommentInput!) {
  createShipmentComment(shipmentId: $shipmentId, input: $input) {
    ...ShipmentCommentFields
  }
}

mutation UpdateShipmentComment(
  $shipmentId: ID!
  $commentId: ID!
  $input: ShipmentCommentUpdateInput!
) {
  updateShipmentComment(shipmentId: $shipmentId, commentId: $commentId, input: $input) {
    ...ShipmentCommentFields
  }
}

mutation DeleteShipmentComment($shipmentId: ID!, $commentId: ID!) {
  deleteShipmentComment(shipmentId: $shipmentId, commentId: $commentId)
}

query ShipmentProfitability($shipmentId: ID!) {
  shipmentProfitability(shipmentId: $shipmentId) {
    shipmentId
    loadedMiles
    deadheadMiles
    totalMiles
    revenue
    estimatedCost
    profit
    marginPercent
    revenuePerLoadedMile
    breakEvenRpm
    missingDistance
    breakdown {
      category
      name
      costBehavior
      ratePerMile
      amount
      effectiveSource
    }
    profile {
      totalCpm
      variableCpm
      fixedCpm
      targetMarginPercent
      includeDeadheadMiles
      asOfDate
      fuel {
        pricePerGallon
        priceDate
        fuelIndexId
        milesPerGallon
        source
      }
      glWindow {
        fromDate
        toDate
        fleetMiles
        hasPostings
      }
    }
  }
}
