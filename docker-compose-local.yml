services:
    db:
        build:
            context: .
            dockerfile: deploy/Dockerfile.postgres
        container_name: db
        ports:
            - "5432:5432"
        environment:
            POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
            POSTGRES_USER: ${DB_USER:-postgres}
            POSTGRES_DB: ${DB_NAME:-trenova_go_db}
            POSTGRES_INITDB_ARGS: "--data-checksums"
            POSTGRES_MULTIPLE_EXTENSIONS: "pg_stat_statements,pg_trgm,btree_gin,btree_gist,postgis,pg_cron"
        volumes:
            - pg_data:/var/lib/postgresql
            - ./config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
        command:
            ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
        restart: always
        deploy:
            resources:
                limits:
                    memory: 512M
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-trenova_go_db}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:latest
        container_name: redis
        ports:
            - "6379:6379"
        command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
        restart: always
        volumes:
            - redis_data:/data
            - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
        deploy:
            resources:
                limits:
                    memory: 2G
                    cpus: "1"
                reservations:
                    memory: 1G
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
        
    redis-insight:
        image: redis/redisinsight:latest
        container_name: redis-insight
        ports:
            - "5540:5540"
        restart: always
        volumes:
            - redisinsight_data:/data
        deploy:
            resources:
                limits:
                    memory: 256M
                reservations:
                    memory: 128M
        healthcheck:
            test: ["CMD", "wget", "-q", "--spider", "http://localhost:5540/api/health/"]
            interval: 30s
            timeout: 10s
            retries: 5
        depends_on:
            redis:
                condition: service_healthy

    minio:
        image: quay.io/minio/minio
        command: server /data --console-address ":9001"
        container_name: minio
        environment:
            - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
            - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
        volumes:
            - minio_data:/data
        ports:
            - 9000:9000 # API
            - 9001:9001 # Console
        restart: always
        deploy:
            resources:
                limits:
                    memory: 512M
        healthcheck:
            test:
                ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
            interval: 30s
            timeout: 20s
            retries: 3

    meilisearch:
        image: getmeili/meilisearch:v1.16
        container_name: meilisearch
        ports:
            - "7700:7700"
        environment:
            - MEILI_MASTER_KEY=CErP8m5HUQUTaporAjiCsNNazOoACqS2bw3IGRsi94I
        volumes:
            - meilisearch_data:/data
        restart: always
        deploy:
            resources:
                limits:
                    memory: 1G
        healthcheck:
            test: curl -f http://localhost:7700/health
            interval: 30s
            timeout: 10s
            retries: 5

    samsara-sim:
        build:
            context: ./services/samsara-sim
        container_name: samsara-sim
        profiles:
            - samsara-sim
        ports:
            - "8091:8091"
        restart: unless-stopped
        healthcheck:
            test:
                ["CMD", "wget", "-q", "--spider", "http://localhost:8091/_sim/health"]
            interval: 30s
            timeout: 5s
            retries: 5

volumes:
    pg_data: {}
    redis_data: {}
    redisinsight_data: {}
    minio_data: {}
    meilisearch_data: {}
