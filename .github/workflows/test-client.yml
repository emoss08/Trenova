name: Test Client

on:
  push:
    branches:
      - master
      - main
      - develop
      - "claude/**"
    paths:
      - "client/**"
      - "services/tms/internal/api/graphql/schema/**"
      - "services/tms/internal/api/graphql/persisted-documents.json"
      - ".github/workflows/test-client.yml"
  pull_request:
    branches:
      - master
      - main
      - develop
    paths:
      - "client/**"
      - "services/tms/internal/api/graphql/schema/**"
      - "services/tms/internal/api/graphql/persisted-documents.json"
      - ".github/workflows/test-client.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./client
        run: pnpm install --frozen-lockfile

      - name: Check GraphQL generated artifacts
        working-directory: ./client
        run: pnpm graphql:codegen:check

      - name: Run tests
        working-directory: ./client
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./client
        run: pnpm install --frozen-lockfile

      - name: Check GraphQL generated artifacts
        working-directory: ./client
        run: pnpm graphql:codegen:check

      - name: Build
        working-directory: ./client
        run: pnpm build

  storybook:
    name: Storybook
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./client
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: ./client
        run: pnpm exec playwright install --with-deps chromium

      - name: Build Storybook
        working-directory: ./client
        run: pnpm build-storybook

      - name: Run Storybook tests
        working-directory: ./client
        run: pnpm test:storybook

  lint:
    name: Run Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./client
        run: pnpm install --frozen-lockfile

      - name: Check GraphQL generated artifacts
        working-directory: ./client
        run: pnpm graphql:codegen:check

      - name: Run lint
        working-directory: ./client
        run: pnpm lint --format=github
